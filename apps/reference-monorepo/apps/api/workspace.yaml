workspace: reference-api
language: python
vocabulary: chemistry

roles:
  element:
    description: Immutable value object — primitive domain shape with no behavior
    folder: elements
  molecule:
    description: Domain entity composed of value objects with simple behavior
    folder: molecules
  reaction:
    description: Workflow that orchestrates ports and entities to fulfil a single use case
    folder: reactions
  interface:
    description: Port contract describing an external capability
    folder: interfaces
  adapter:
    description: Adapter implementing a port against a real backend
    folder: adapters
  buffer:
    description: Middleware wrapper for cross-cutting concerns
    folder: buffers

bonds:
  element: [element]
  molecule: [element, molecule]
  reaction: [element, molecule, interface]
  interface: [element, molecule]
  adapter: [element, molecule, interface, adapter]
  buffer: [element, molecule, interface]

paths:
  compounds: ./src/compounds

rules:
  cross_compound_imports: public_only
  role_from_path: true
  public_surface: __init__.py
  manifest_filename: compound.yaml
