name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is read from `packageManager` in the root package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Create release PR (publish requires NPM_TOKEN — uncomment when ready)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          # publish: pnpm changeset publish
          # ^ Re-enable once an NPM_TOKEN is configured in repo secrets, OR set
          # up npm trusted publishing for each @chemag/* package on npmjs.com.
          # Without this, the action attempts ENEEDAUTH publishing on every
          # push to main and fails the workflow.
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
