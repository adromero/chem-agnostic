name: Reference monorepo CI

on:
  push:
    branches: [main]
    paths:
      - "apps/reference-monorepo/**"
      - ".github/workflows/reference-monorepo-ci.yml"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/reference-monorepo/**"
      - ".github/workflows/reference-monorepo-ci.yml"
      - "packages/**"

concurrency:
  group: reference-monorepo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reference:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build the outer chemag toolkit so the local `chemag` binary is available.
      - name: Install outer deps + build chemag
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm --filter @chemag/cli link --global

      # Reference monorepo is its OWN pnpm workspace — separate install step.
      - name: Install reference-monorepo deps
        working-directory: apps/reference-monorepo
        run: pnpm install --no-frozen-lockfile

      - name: chemag check (TS workspace)
        working-directory: apps/reference-monorepo
        run: pnpm chemag:check:ts

      - name: chemag check (Python workspace)
        working-directory: apps/reference-monorepo
        run: pnpm chemag:check:python

      - name: chemag analyze (both workspaces)
        working-directory: apps/reference-monorepo
        run: pnpm chemag:analyze

      # Snapshot of `chemag graph workspace.yaml` must match the committed file.
      - name: Verify graph snapshot is up to date
        working-directory: apps/reference-monorepo
        run: |
          chemag graph workspace.yaml > /tmp/graph.txt
          diff -u test/chemag-graph.snapshot.txt /tmp/graph.txt

      # Ensure emit-rules is idempotent — re-running produces zero diff vs the
      # checked-in CLAUDE.md / AGENTS.md / etc.
      - name: emit-rules idempotence
        working-directory: apps/reference-monorepo
        run: |
          chemag emit-rules --tool all
          if ! git diff --quiet -- CLAUDE.md AGENTS.md .clinerules .aider/CONVENTIONS.md .cursor/rules/architecture.mdc .github/copilot-instructions.md; then
            echo "emit-rules produced a diff against the checked-in artifacts"
            git diff -- CLAUDE.md AGENTS.md .clinerules .aider/CONVENTIONS.md .cursor/rules/architecture.mdc .github/copilot-instructions.md
            exit 1
          fi

      # install-hooks --tool all on the canonical fixture should report
      # no-op rows for every tool (everything is already installed).
      - name: install-hooks --tool all (idempotent)
        working-directory: apps/reference-monorepo
        run: |
          set -e
          OUT=$(chemag install-hooks --tool all 2>&1)
          echo "$OUT"
          # Acceptance: 6 rows, every row reports `ok` or `no-op` (no `error`).
          if echo "$OUT" | grep -q '\berror\b'; then
            echo "install-hooks fan-out reported an error row"
            exit 1
          fi
          # Spot-check: each tool name appears exactly once in the table.
          for t in claude cursor codex aider cline copilot; do
            n=$(echo "$OUT" | grep -c "^[[:space:]]*${t}[[:space:]]" || true)
            if [ "$n" -ne 1 ]; then
              echo "expected one row for ${t}, got ${n}"
              exit 1
            fi
          done

      # MCP smoke test — spawn the server, send tools/call where_should_this_go
      # over stdin/stdout, assert a billing/integrations suggestion comes back.
      - name: MCP where_should_this_go smoke test
        working-directory: apps/reference-monorepo
        run: |
          node ../../scripts/mcp-smoke.mjs

      - name: Build TS apps
        working-directory: apps/reference-monorepo
        run: |
          pnpm --filter web build || true
          pnpm --filter worker build || true

      # Python plugin coverage — install the api deps + run pytest.
      - name: Python smoke tests
        working-directory: apps/reference-monorepo/apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pytest -q

      # Outer-repo structure test (validates apps/reference-monorepo/ layout).
      - name: Structure test
        run: pnpm vitest run --config vitest.root.config.ts test/reference-monorepo/structure.test.ts
