workspace: port-003-class-import
language: typescript
roles:
  reaction:
    description: Workflow
    folder: reactions
  interface:
    description: Contract
    folder: interfaces
  adapter:
    description: Implementation
    folder: adapters
bonds:
  reaction: [interface, adapter]
  interface: []
  adapter: [interface, adapter]
paths:
  compounds: ./src/compounds
compound_types:
  compound:
    allowed_roles: [reaction, interface, adapter]
rules:
  cross_compound_imports: public_only
  role_from_path: true
  public_surface: public.ts
